<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرّب التلاوة</title>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://quraan-sixid-7b13a-default-rtdb.firebaseio.com"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // Save session to Firebase
  window.saveToFirebase = async function(data) {
    try {
      await push(ref(db, 'sessions'), data);
    } catch(e) { console.error('Firebase save error', e); }
  };

  // Load last 10 sessions
  window.loadHistory = function(callback) {
    const q = query(ref(db, 'sessions'), orderByChild('timestamp'), limitToLast(10));
    onValue(q, snap => {
      const items = [];
      snap.forEach(child => items.unshift({ id: child.key, ...child.val() }));
      callback(items);
    });
  };
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1a0533 0%, #0a0a1a 60%, #000510 100%);

  .mic-btn {

    margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(231,76,60,0.3)}
    50%{transform:scale(1.04);box-shadow:0 0 0 12px rgba(231,76,60,0)}

  .waves { display: flex; justify-content: center; gap: 5px; align-items: center; margin-bottom: 18px; height: 36px; }

  .wave-bar:nth-child(1){animation-delay:0s;height:10px}
  .wave-bar:nth-child(2){animation-delay:.1s;height:22px}
  .wave-bar:nth-child(3){animation-delay:.2s;height:30px}
  .wave-bar:nth-child(4){animation-delay:.3s;height:18px}
  .wave-bar:nth-child(5){animation-delay:.4s;height:26px}
  @keyframes waveAnim { to { transform: scaleY(2.5); } }

  .live-transcript {
    color: #c0a882; font-size: 16px; direction: rtl; margin-bottom: 16px;
    font-family: 'Amiri', serif; min-height: 30px;
    background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 14px; display: none;
  }
  .spinner {
    width: 60px; height: 60px; border-radius: 50%;
    border: 3px solid transparent; border-top: 3px solid #d4af7a;
    margin: 0 auto 16px; animation: spin 0.8s linear infinite; display: none;

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {

<!-- ===== HISTORY TAB ===== -->

    <div class="empty-history" id="empty-history">⏳ جاري تحميل السجل...</div>

<script>
const AYAHS = [
  { surah:"الفاتحة", ayah:1, text:"بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ" },
  { surah:"الفاتحة", ayah:2, text:"الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ" },
  { surah:"الفاتحة", ayah:3, text:"الرَّحْمَٰنِ الرَّحِيمِ" },
  { surah:"الفاتحة", ayah:4, text:"مَالِكِ يَوْمِ الدِّينِ" },
  { surah:"الفاتحة", ayah:5, text:"إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ" },
  { surah:"الفاتحة", ayah:6, text:"اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ" },
  { surah:"الفاتحة", ayah:7, text:"صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ" },
  { surah:"الإخلاص", ayah:1, text:"قُلْ هُوَ اللَّهُ أَحَدٌ" },
  { surah:"الإخلاص", ayah:2, text:"اللَّهُ الصَّمَدُ" },
  { surah:"الإخلاص", ayah:3, text:"لَمْ يَلِدْ وَلَمْ يُولَدْ" },
  { surah:"الكوثر", ayah:1, text:"إِنَّا أَعْطَيْنَاكَ الْكَوْثَرَ" },
  { surah:"الكوثر", ayah:2, text:"فَصَلِّ لِرَبِّكَ وَانْحَرْ" },
  { surah:"الناس", ayah:1, text:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ" },
  { surah:"الناس", ayah:2, text:"مَلِكِ النَّاسِ" },
  { surah:"الناس", ayah:3, text:"إِلَٰهِ النَّاسِ" },
];

let useCustom = false;
let currentAyah = AYAHS[0];
let recognition = null;
let mediaRecorder = null;
let finalTranscript = "";

function showTab(tab) {
  document.getElementById('tab-practice').style.display = tab === 'practice' ? 'block' : 'none';
  document.getElementById('tab-history').style.display  = tab === 'history'  ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='practice') || (i===1 && tab==='history'));
  });
  if (tab === 'history') loadHistoryUI();
}

function getTargetText() {
  return useCustom ? document.getElementById('custom-input').value.trim() : currentAyah.text;
}

function toggleCustom() {
  useCustom = !useCustom;
  document.getElementById('selector-area').classList.toggle('hidden', useCustom);
  document.getElementById('custom-area').classList.toggle('hidden', !useCustom);
  document.querySelector('.toggle-btn').textContent = useCustom ? '← آيات جاهزة' : 'نص مخصص';
  resetAll();
}

function onAyahChange() {
  const idx = parseInt(document.getElementById('ayah-select').value);
  currentAyah = AYAHS[idx];
  document.getElementById('ayah-text').textContent = currentAyah.text;
  document.getElementById('ayah-ref').textContent = `سورة ${currentAyah.surah} ﴿${currentAyah.ayah}﴾`;
  resetAll();
}
function onCustomChange() { resetAll(); }

function startRecording() {
  finalTranscript = "";
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('rec-card').classList.add('active');
  document.getElementById('mic-btn').classList.add('hidden');
  document.getElementById('stop-btn').classList.remove('hidden');
  document.getElementById('waves').classList.remove('hidden');
  document.getElementById('rec-label').classList.remove('hidden');
  document.getElementById('start-label').classList.add('hidden');
  document.getElementById('rec-hint').classList.add('hidden');
  document.getElementById('live-transcript').style.display = 'block';

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.lang = 'ar-SA';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = (e) => {
      let interim = '';
      finalTranscript = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      document.getElementById('live-transcript').textContent = finalTranscript + interim;
    };
    recognition.onerror = (event) => {
      console.warn('Speech recognition error:', event.error);
    };
    recognition.start();
  }

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.onstop = () => stream.getTracks().forEach(t => t.stop());
    mediaRecorder.start(100);
  }).catch(() => {});
}

function stopRecording() {
  if (recognition) recognition.stop();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();

  document.getElementById('stop-btn').classList.add('hidden');
  document.getElementById('waves').classList.add('hidden');
  document.getElementById('rec-label').classList.add('hidden');
  document.getElementById('live-transcript').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('spinner-label').style.display = 'block';

  setTimeout(() => analyzeWithAI(), 800);
}

async function analyzeWithAI() {
  const spoken = document.getElementById('live-transcript').textContent || finalTranscript || "";
  const target = getTargetText();

  const prompt = `أنت متخصص في تحليل أخطاء قراءة القرآن في الحروف المتشابهة.
قارن بين النص الصحيح والمقروء وحدد أخطاء الحروف المتشابهة فقط مثل:
ص↔س↔ث، ط↔ت↔ظ، ض↔ظ↔ذ، د↔ذ، ح↔ه↔خ، ع↔غ، ق↔ك
النص الصحيح: "${target}"
المقروء: "${spoken || '(غير واضح)'}"
أجب فقط بـ JSON بدون أي نص آخر أو backticks:
{"correct_words":[],"errors":[{"position":0,"expected":"","spoken":"","confused_pair":["",""],"tip":""}],"overall":"","score":0,"praise":""}`;

  try {
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AQ.Ab8RN6JisbsKrOHv08KDOpoo1zVZP4audk1NOV4iVCgiMpiUqw", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.1 }
      })
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error('Gemini API خطأ: ' + (data.error?.message || res.status));
    }
    if (!data.candidates || data.candidates.length === 0) {
      throw new Error('Gemini لم يعطِ جواباً');
    }

    const txt = data.candidates[0].content.parts[0].text;
    const parsed = JSON.parse(txt.replace(/```json|```/g, "").trim());

    // Save to Firebase
    if (window.saveToFirebase) {
      window.saveToFirebase({
        ayah: target,
        surah: useCustom ? 'نص مخصص' : `${currentAyah.surah} ${currentAyah.ayah}`,
        spoken: spoken,
        score: parsed.score || 0,
        errors: parsed.errors || [],
        overall: parsed.overall || '',
        timestamp: Date.now()
      });
    }

    showResults(parsed, target);
  } catch(e) {
    console.error('Analysis error:', e);
    showError(e.message || 'خطأ غير معروف');
  }
}

function showResults(r, target) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('spinner-label').style.display = 'none';
  document.getElementById('rec-card').classList.remove('active');
  document.getElementById('start-label').classList.remove('hidden');
  document.getElementById('rec-hint').classList.remove('hidden');
  document.getElementById('mic-btn').classList.remove('hidden');

  const score = r.score || 0;
  const color = score >= 85 ? '#27ae60' : score >= 60 ? '#f39c12' : '#e74c3c';
  const circ = 2 * Math.PI * 34;
  document.getElementById('score-arc').style.strokeDashoffset = circ * (1 - score/100);
  document.getElementById('score-arc').setAttribute('stroke', color);
  document.getElementById('score-text').textContent = score;
  document.getElementById('score-text').setAttribute('fill', color);
  document.getElementById('overall-label').textContent = r.overall || '';
  document.getElementById('praise-label').textContent = r.praise || '';
  document.getElementById('err-count').textContent =
    r.errors?.length > 0 ? `${r.errors.length} خطأ في الحروف المتشابهة` : '';

  const words = target.split(' ');
  let html = '';
  words.forEach((w, i) => {
    const isErr = r.errors?.some(e => e.position === i);
    const isOk  = r.correct_words?.includes(w);
    if (isErr)       html += `<span class="word-err">${w}<span class="badge badge-err">!</span></span> `;
    else if (isOk)   html += `<span class="word-ok">${w}<span class="badge badge-ok">✓</span></span> `;
    else             html += `<span class="word-neutral">${w}</span> `;
  });
  document.getElementById('highlighted-ayah').innerHTML = html;

  const errList = document.getElementById('error-list');
  errList.innerHTML = '';
  if (r.errors?.length > 0) {
    document.getElementById('success-msg').classList.add('hidden');
    r.errors.forEach(err => {
      const div = document.createElement('div');
      div.className = 'error-item';
      div.innerHTML = `
        <div class="error-row">
          <span class="tag-wrong">${err.spoken || '؟'}</span>
          <span style="color:#555">←</span>
          <span class="tag-right">${err.expected}</span>
          ${err.confused_pair ? `<span class="confused-pair">${err.confused_pair[0]} ↔ ${err.confused_pair[1]}</span>` : ''}
        </div>
        <div class="tip">💡 ${err.tip || ''}</div>`;
      errList.appendChild(div);
    });
  } else {
    document.getElementById('success-msg').classList.remove('hidden');
  }

  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('spinner-label').style.display = 'none';
  console.error('Show error called:', msg);
  alert('حدث خطأ: ' + (msg || 'تأكد من إذن الميكروفون وحاول مرة أخرى.'));
  resetAll();
}

function resetAll() {
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('rec-card').classList.remove('active');
  document.getElementById('mic-btn').classList.remove('hidden');
  document.getElementById('stop-btn').classList.add('hidden');
  document.getElementById('waves').classList.add('hidden');
  document.getElementById('rec-label').classList.add('hidden');
  document.getElementById('start-label').classList.remove('hidden');
  document.getElementById('rec-hint').classList.remove('hidden');
  document.getElementById('live-transcript').style.display = 'none';
  document.getElementById('live-transcript').textContent = '';
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('spinner-label').style.display = 'none';
  finalTranscript = '';
}

function loadHistoryUI() {
  if (!window.loadHistory) return;
  window.loadHistory(items => {
    const panel = document.getElementById('history-panel');
    const empty = document.getElementById('empty-history');
    panel.innerHTML = '';
    if (items.length === 0) {
      panel.innerHTML = '<div class="empty-history">لا يوجد سجل بعد. ابدأ التدريب! 📖</div>';
      return;
    }
    items.forEach(item => {
      const score = item.score || 0;
      const color = score >= 85 ? '#27ae60' : score >= 60 ? '#f39c12' : '#e74c3c';
      const date = new Date(item.timestamp).toLocaleDateString('ar-SA', {
        month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
      });
      const errNames = (item.errors || []).map(e => e.expected).join('، ');
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <div class="history-top">
          <div class="history-ayah">${item.surah}</div>
          <span class="history-score-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">
            ${score}%
          </span>
        </div>
        <div style="color:#c0a882;font-family:'Amiri',serif;font-size:15px;direction:rtl;margin-bottom:4px">
          ${item.ayah}
        </div>
        <div class="history-meta">${date}</div>
        ${errNames ? `<div class="history-errors">❌ أخطاء: ${errNames}</div>` : '<div style="color:#69f0ae;font-size:12px;margin-top:4px">✓ لا أخطاء</div>'}
      `;
      panel.appendChild(div);
    });
  });
}
